name: Lint GitHub Actions Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: actionlint
        uses: reviewdog/action-actionlint@05c08f7ee23a2e5db23b73e8d74bf5d5b6a0db53 # v1.65.0
        with:
          reporter: github-pr-review
          fail_level: error

      - name: Install ghalint
        run: |
          GHALINT_VERSION="v1.3.0"
          curl -sSfL "https://github.com/suzuki-shunsuke/ghalint/releases/download/${GHALINT_VERSION}/ghalint_linux_amd64.tar.gz" | tar xz -C /usr/local/bin ghalint

      - name: ghalint
        run: ghalint run
